repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: poetry run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: compileall
        name: compile sources
        entry: python3 -m compileall app tests alembic
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: poetry run pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
