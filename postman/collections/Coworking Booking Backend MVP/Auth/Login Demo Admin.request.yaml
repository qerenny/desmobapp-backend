$kind: http-request
description: Logs in the seeded demo admin and stores adminAccessToken.
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{adminEmail}}",
      "password": "{{adminPassword}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });
      const payload = pm.response.json();
      pm.collectionVariables.set('adminAccessToken', payload.accessToken);
      pm.collectionVariables.set('adminUserId', payload.user.id);
    language: text/javascript
order: 2000
