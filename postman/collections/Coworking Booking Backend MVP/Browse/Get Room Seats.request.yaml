$kind: http-request
description: Loads seats for the selected room and stores the first seatId.
url: "{{baseUrl}}/rooms/{{roomId}}/seats"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });
      const payload = pm.response.json();
      if (Array.isArray(payload) && payload.length > 0) {
        pm.collectionVariables.set('seatId', payload[0].id);
      }
    language: text/javascript
order: 4000
