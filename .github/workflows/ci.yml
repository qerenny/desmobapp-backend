name: backend-ci

on:
  push:
    branches:
      - main
      - master
      - develop
      - "codex/**"
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: coworking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d coworking"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DEBUG: "false"
      LOG_LEVEL: INFO
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: coworking
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      SECRET_KEY: ci-secret-key-please-change-at-least-32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Seed RBAC
        run: poetry run python -m app.scripts.seed_rbac

      - name: Compile sources
        run: python3 -m compileall app tests alembic

      - name: Ruff
        run: poetry run ruff check .

      - name: Pytest
        run: poetry run pytest -q
